<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Gulu University Feedback</title>
  <style>
    :root { --primary: #44A08D; --accent: #F4C542; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f8fdfb;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; color: #1a2e28; margin-bottom: 10px; }
    p { color: #5a7a72; font-size: 0.95rem; line-height: 1.6; max-width: 300px; margin-bottom: 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary); color: white;
      padding: 13px 24px; border-radius: 9999px;
      font-size: 0.95rem; font-weight: 500;
      text-decoration: none; border: none; cursor: pointer;
      font-family: inherit;
    }
    .accent-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }
  </style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Please check your internet connection and try again. Your previously loaded pages may still be available.</p>
  <button class="btn" onclick="window.location.reload()">
    ↺ Try Again
  </button>
</body>
</html>
